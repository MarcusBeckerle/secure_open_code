<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureOpenCode</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #0d1117;
            --surface:     #161b22;
            --surface-2:   #21262d;
            --border:      #30363d;
            --border-sub:  #21262d;
            --accent:      #3fb950;
            --accent-dim:  #238636;
            --text:        #c9d1d9;
            --text-2:      #8b949e;
            --text-dim:    #484f58;
            --danger:      #f85149;
            --danger-dim:  #da3633;
            --warn:        #d29922;
            --radius:      8px;
            --radius-sm:   4px;
            --shadow:      0 1px 3px rgba(0,0,0,.5), 0 4px 16px rgba(0,0,0,.35);
            --mono:        'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; height: 280px;
            background: radial-gradient(ellipse 80% 100% at 50% 0%, rgba(63,185,80,.06) 0%, transparent 100%);
            pointer-events: none;
        }

        /* ── Navbar ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            height: 58px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: rgba(13,17,23,.9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 15px; font-weight: 600; color: var(--text);
        }
        .nav-brand svg { color: var(--accent); flex-shrink: 0; }
        .nav-right { display: flex; align-items: center; gap: 10px; }

        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
            border: 1px solid transparent; white-space: nowrap;
        }
        .badge-ok   { background: rgba(63,185,80,.1);  border-color: rgba(63,185,80,.28);  color: var(--accent); }
        .badge-err  { background: rgba(248,81,73,.1);  border-color: rgba(248,81,73,.28);  color: var(--danger); }
        .badge-warn { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.28); color: var(--warn); }
        .badge-idle { background: var(--surface-2);    border-color: var(--border);         color: var(--text-2); }

        .dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block;
        }
        .dot-g { background: var(--accent); }
        .dot-r { background: var(--danger); }
        .dot-y { background: var(--warn); }
        .dot-x { background: var(--text-dim); }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:.5; transform:scale(.8); }
        }
        .dot-pulse { animation: pulse 2s ease-in-out infinite; }

        /* ── Main ── */
        .main { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; position: relative; }

        /* ── Notice ── */
        .notice {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            background: rgba(210,153,34,.07); border: 1px solid rgba(210,153,34,.25);
            border-radius: var(--radius); padding: 12px 16px; margin-bottom: 22px;
            font-size: 13px; color: var(--warn);
        }
        .notice-left { display: flex; align-items: center; gap: 8px; }

        /* ── Section header ── */
        .sec-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px;
        }
        .sec-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .count {
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text-2); font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 12px; min-width: 22px; text-align: center;
        }
        .sec-right { display: flex; align-items: center; gap: 10px; }
        .last-updated { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinning { animation: spin .8s linear infinite; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
            font-size: 13px; font-weight: 500; cursor: pointer; user-select: none;
            transition: background .12s, border-color .12s, color .12s;
            white-space: nowrap; line-height: 1.4;
        }
        .btn:hover  { background: var(--surface); border-color: #484f58; }
        .btn:active { transform: scale(.98); }
        .btn-primary { background: var(--accent-dim); border-color: transparent; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger  { background: transparent; border-color: var(--border); color: var(--danger); }
        .btn-danger:hover { background: rgba(248,81,73,.1); border-color: var(--danger-dim); }
        .btn-ghost   { background: transparent; border-color: transparent; color: var(--text-2); }
        .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
        .btn-sm  { padding: 4px 10px; font-size: 12px; }
        .btn-ico { padding: 5px; width: 28px; height: 28px; justify-content: center; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        /* ── Session cards ── */
        .sessions { display: flex; flex-direction: column; gap: 10px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color .15s, box-shadow .15s, opacity .2s, transform .2s;
        }
        .card:hover { border-color: #484f58; box-shadow: var(--shadow); }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-new { animation: cardIn .2s ease forwards; }

        /* card header */
        .card-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-sub);
        }
        .card-name { display: flex; align-items: center; gap: 9px; }
        .c-name { font-family: var(--mono); font-size: 13px; font-weight: 500; }
        .status-pill {
            padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500;
            background: rgba(63,185,80,.12); border: 1px solid rgba(63,185,80,.25); color: var(--accent);
        }
        .card-actions { display: flex; align-items: center; gap: 8px; }

        /* uptime badge in header */
        .uptime-tag {
            font-size: 11px; color: var(--text-2);
            background: var(--surface-2); border: 1px solid var(--border-sub);
            padding: 2px 8px; border-radius: 12px; white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* meta info row */
        .card-meta {
            display: flex; align-items: center; gap: 24px;
            padding: 9px 15px;
            border-bottom: 1px solid var(--border-sub);
            background: rgba(255,255,255,.015);
        }
        .meta-item { display: flex; align-items: center; gap: 7px; }
        .meta-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
            color: var(--text-dim); font-weight: 600; white-space: nowrap;
        }
        .meta-val { font-size: 12px; color: var(--text-2); }
        .meta-mono { font-family: var(--mono); font-size: 11.5px; }

        /* card body */
        .card-body { padding: 13px 15px; }
        .mounts { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
        .mount  { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
        .m-host { font-family: var(--mono); color: var(--text); word-break: break-all; }
        .m-arrow { color: var(--text-dim); flex-shrink: 0; font-size: 11px; }
        .m-cont  { font-family: var(--mono); color: var(--text-2); flex-shrink: 0; }

        .cmd-row {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            background: var(--surface-2); border: 1px solid var(--border-sub);
            border-radius: var(--radius-sm); padding: 9px 12px;
        }
        .cmd-text {
            font-family: var(--mono); font-size: 12px; color: var(--accent);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .cmd-prefix { color: var(--text-dim); margin-right: 5px; }

        /* ── States ── */
        .empty { text-align: center; padding: 60px 24px; color: var(--text-2); }
        .empty-icon { opacity: .35; margin-bottom: 16px; }
        .empty-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
        .empty-sub { font-size: 13px; margin-bottom: 22px; }
        .mono-inline { font-family: var(--mono); background: var(--surface-2); padding: 1px 6px; border-radius: 3px; font-size: 12px; }
        .loading { text-align: center; padding: 40px; color: var(--text-2); font-size: 13px; }
        .err-box {
            background: rgba(248,81,73,.07); border: 1px solid rgba(248,81,73,.22);
            border-radius: var(--radius); padding: 14px; color: var(--danger); font-size: 13px;
        }

        /* ── Modal ── */
        .overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(1,4,9,.82); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn .15s ease;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px 24px;
            width: 100%; max-width: 460px;
            box-shadow: 0 8px 32px rgba(0,0,0,.7);
            animation: scaleIn .15s ease;
        }
        @keyframes scaleIn { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
        .modal-title {
            font-size: 15px; font-weight: 600;
            display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
        }
        .field { margin-bottom: 6px; }
        .field label {
            display: block; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .5px;
            color: var(--text-2); margin-bottom: 6px;
        }
        .field input {
            width: 100%; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 8px 11px; color: var(--text);
            font-family: var(--mono); font-size: 13px; outline: none;
            transition: border-color .14s, box-shadow .14s;
        }
        .field input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px rgba(63,185,80,.1); }
        .hint { font-size: 12px; color: var(--text-2); margin-top: 5px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .result-box {
            background: rgba(63,185,80,.07); border: 1px solid rgba(63,185,80,.2);
            border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 16px;
        }
        .result-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
        .result-cmd { font-family: var(--mono); font-size: 13px; color: var(--text); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .result-cmd span { word-break: break-all; }

        /* ── Toasts ── */
        .toast-wrap { position: fixed; bottom: 22px; right: 22px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 9px 14px; font-size: 13px; min-width: 200px;
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px;
            animation: toastIn .18s ease;
        }
        .toast-ok  { border-left: 3px solid var(--accent); }
        .toast-err { border-left: 3px solid var(--danger); }
        @keyframes toastIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        SecureOpenCode
    </div>
    <div class="nav-right">
        <span class="badge badge-idle" id="b-docker"><span class="dot dot-x"></span>Docker</span>
        <span class="badge badge-idle" id="b-image"><span class="dot dot-x"></span>Image</span>
    </div>
</nav>

<main class="main">

    <div class="notice" id="build-notice" style="display:none">
        <div class="notice-left">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Docker image <strong style="color:var(--text)">secure-opencode</strong> is not built yet.
        </div>
        <button class="btn btn-sm" id="build-btn" onclick="buildImage()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            </svg>
            Build Image
        </button>
    </div>

    <div class="sec-header">
        <div class="sec-title">
            Active Sessions
            <span class="count" id="s-count">0</span>
        </div>
        <div class="sec-right">
            <div class="last-updated">
                <svg id="ref-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
                </svg>
                <span id="s-updated">–</span>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Session
            </button>
        </div>
    </div>

    <!-- s-container holds either #sessions-grid or #empty-state, never both -->
    <div id="s-container">
        <div class="loading">Loading sessions…</div>
    </div>

</main>

<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
    <div class="modal">
        <div class="modal-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            New OpenCode Session
        </div>
        <div id="modal-body">
            <div class="field">
                <label>Directory Path</label>
                <input id="path-in" type="text" placeholder="C:\Users\yourname\projects\myapp" autocomplete="off" spellcheck="false">
                <div class="hint">Absolute path to the project directory to mount in the container.</div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="start-btn" onclick="createSession()">Start Session</button>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
    // ── API ───────────────────────────────────────────────────────────────────
    const api = {
        get:  url      => fetch(url).then(r => r.json()),
        post: (url, b) => fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).then(r => r.json()),
        del:  url      => fetch(url, { method: 'DELETE' }).then(r => r.json()),
    };

    // ── State ─────────────────────────────────────────────────────────────────
    let sessions = [];
    let firstRender = true;

    // ── Time helpers ──────────────────────────────────────────────────────────
    function formatUptime(iso) {
        const sec = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
        if (sec < 60)   return `${sec}s`;
        if (sec < 3600) return `${Math.floor(sec / 60)}m ${sec % 60}s`;
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
        if (h < 24) return `${h}h ${m}m`;
        return `${Math.floor(h / 24)}d ${h % 24}h`;
    }

    function formatDate(iso) {
        return new Date(iso).toLocaleString(undefined, {
            month: 'short', day: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    // Tick uptime badges in-place — no DOM re-render, no flicker
    function tickUptimes() {
        document.querySelectorAll('.js-uptime[data-created]').forEach(el => {
            el.textContent = formatUptime(el.dataset.created);
        });
    }
    setInterval(tickUptimes, 10_000);

    // ── Status badges ─────────────────────────────────────────────────────────
    async function refreshStatus() {
        try {
            const s = await api.get('/api/status');
            setDockerBadge(s.docker);
            setImageBadge(s.image);
        } catch { setDockerBadge(false); }
    }

    function setDockerBadge(ok) {
        const el = document.getElementById('b-docker');
        el.className = ok ? 'badge badge-ok' : 'badge badge-err';
        el.innerHTML  = ok
            ? '<span class="dot dot-g dot-pulse"></span>Docker'
            : '<span class="dot dot-r"></span>Docker offline';
    }

    function setImageBadge(img) {
        const el = document.getElementById('b-image');
        const note = document.getElementById('build-notice');
        if (img && img.built) {
            el.className = 'badge badge-ok';
            el.innerHTML = '<span class="dot dot-g"></span>Image ready';
            note.style.display = 'none';
        } else {
            el.className = 'badge badge-warn';
            el.innerHTML = '<span class="dot dot-y"></span>Not built';
            note.style.display = 'flex';
        }
    }

    // ── Session rendering (DOM-diffing, no full re-render) ────────────────────
    async function refreshSessions() {
        document.getElementById('ref-icon').classList.add('spinning');
        try {
            const data = await api.get('/api/sessions');
            if (data.error) throw new Error(data.error);
            sessions = data;
            patchSessions(data);
            document.getElementById('s-count').textContent = data.length;
            document.getElementById('s-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
        } catch (e) {
            // Only replace content if we're still on the loading screen
            if (firstRender) {
                document.getElementById('s-container').innerHTML =
                    `<div class="err-box">Failed to load sessions: ${esc(e.message)}</div>`;
            }
        } finally {
            firstRender = false;
            document.getElementById('ref-icon').classList.remove('spinning');
        }
    }

    function patchSessions(list) {
        const container = document.getElementById('s-container');

        // ── Empty state ───────────────────────────────────────────────────────
        if (!list.length) {
            const grid = document.getElementById('sessions-grid');
            if (grid) grid.remove();
            if (!document.getElementById('empty-state')) {
                container.innerHTML = emptyStateHtml();
            }
            return;
        }

        // Remove empty / loading placeholder if present
        const empty = document.getElementById('empty-state');
        if (empty) empty.remove();
        if (firstRender || !document.getElementById('sessions-grid')) {
            container.innerHTML = '<div id="sessions-grid" class="sessions"></div>';
        }

        const grid = document.getElementById('sessions-grid');
        const incoming = new Map(list.map(s => [s.id, s]));

        // Remove cards no longer in the list
        [...grid.querySelectorAll('.card[data-id]')].forEach(card => {
            if (!incoming.has(card.dataset.id)) {
                card.style.opacity = '0';
                card.style.transform = 'translateY(-4px)';
                setTimeout(() => card.remove(), 200);
            }
        });

        // Add new cards / surgically update existing ones
        const existingCards = new Map(
            [...grid.querySelectorAll('.card[data-id]')].map(el => [el.dataset.id, el])
        );

        list.forEach(s => {
            if (existingCards.has(s.id)) {
                updateCard(existingCards.get(s.id), s);
            } else {
                const wrap = document.createElement('div');
                wrap.innerHTML = cardHtml(s);
                const card = wrap.firstElementChild;
                card.classList.add('card-new');
                grid.appendChild(card);
            }
        });
    }

    // Update only the mutable parts of an existing card — status pill, uptime
    function updateCard(card, s) {
        const pill = card.querySelector('.status-pill');
        if (pill && pill.textContent !== s.status) pill.textContent = s.status;
        // uptime is updated by tickUptimes() independently
    }

    function emptyStateHtml() {
        return `<div id="empty-state" class="empty">
            <div class="empty-icon">
                <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
                     stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
            </div>
            <div class="empty-title">No active sessions</div>
            <div class="empty-sub">
                Click <strong>New Session</strong> or run
                <span class="mono-inline">soc</span> in your terminal.
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Session
            </button>
        </div>`;
    }

    function cardHtml(s) {
        const mounts = s.mounts.map(m => `
            <div class="mount">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim);flex-shrink:0">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span class="m-host">${esc(m.host)}</span>
                <span class="m-arrow">&#8594;</span>
                <span class="m-cont">${esc(m.container)}</span>
            </div>`).join('');

        const cmd = `docker exec -it ${s.name} opencode`;
        const cmdEsc = esc(cmd);
        const cmdJs  = cmd.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const started = s.created ? formatDate(s.created) : '–';

        return `
        <div class="card" id="card-${s.id}" data-id="${s.id}">
            <div class="card-head">
                <div class="card-name">
                    <span class="dot dot-g dot-pulse"></span>
                    <span class="c-name">${esc(s.name)}</span>
                    <span class="status-pill">${esc(s.status)}</span>
                </div>
                <div class="card-actions">
                    <span class="uptime-tag js-uptime" data-created="${esc(s.created)}">${s.created ? formatUptime(s.created) : '–'}</span>
                    <button class="btn btn-danger btn-sm" onclick="stopSession('${s.id}','${esc(s.name)}',this)">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        </svg>
                        Stop
                    </button>
                </div>
            </div>
            <div class="card-meta">
                <div class="meta-item">
                    <span class="meta-label">Started</span>
                    <span class="meta-val">${esc(started)}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Container</span>
                    <span class="meta-val meta-mono">${esc(s.id)}</span>
                </div>
            </div>
            <div class="card-body">
                ${mounts ? `<div class="mounts">${mounts}</div>` : ''}
                <div class="cmd-row">
                    <span class="cmd-text"><span class="cmd-prefix">$</span>${cmdEsc}</span>
                    <button class="btn btn-ghost btn-ico" title="Copy command" onclick="copyText('${cmdJs}',this)">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>`;
    }

    // ── Actions ───────────────────────────────────────────────────────────────
    async function stopSession(id, name, btn) {
        if (!confirm(`Stop session "${name}"?\nThe container will be removed.`)) return;
        btn.disabled = true;
        btn.textContent = 'Stopping…';
        try {
            const r = await api.del(`/api/sessions/${id}`);
            if (r.error) throw new Error(r.error);
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.style.opacity = '0';
                card.style.transform = 'translateY(-4px)';
                setTimeout(() => {
                    card.remove();
                    sessions = sessions.filter(s => s.id !== id);
                    document.getElementById('s-count').textContent = sessions.length;
                    if (!sessions.length) patchSessions([]);
                }, 200);
            }
            toast('Session stopped.', true);
        } catch (e) {
            toast('Stop failed: ' + e.message, false);
            btn.disabled = false;
            btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>Stop`;
        }
    }

    async function buildImage() {
        const btn = document.getElementById('build-btn');
        btn.disabled = true; btn.textContent = 'Building…';
        toast('Building Docker image — this may take a few minutes.', true);
        try {
            const r = await api.post('/api/image/build', {});
            if (r.error) throw new Error(r.error);
            toast('Image built successfully!', true);
            refreshStatus();
        } catch (e) {
            toast('Build failed: ' + e.message, false);
        } finally {
            btn.disabled = false; btn.textContent = 'Build Image';
        }
    }

    async function createSession() {
        const path = document.getElementById('path-in')?.value?.trim();
        if (!path) { toast('Enter a directory path.', false); return; }
        const btn = document.getElementById('start-btn');
        btn.disabled = true; btn.textContent = 'Starting…';
        try {
            const r = await api.post('/api/sessions', { path });
            if (r.error) throw new Error(r.error);
            const cmdJs = r.attach_cmd.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            document.getElementById('modal-body').innerHTML = `
                <div style="font-size:13px;color:var(--text-2);margin-bottom:14px">
                    Session <strong style="color:var(--text)">${esc(r.name)}</strong> started.
                    Run this command in your terminal to connect:
                </div>
                <div class="result-box">
                    <div class="result-label">Connect command</div>
                    <div class="result-cmd">
                        <span>${esc(r.attach_cmd)}</span>
                        <button class="btn btn-ghost btn-ico" title="Copy" onclick="copyText('${cmdJs}',this)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                        </button>
                    </div>
                </div>`;
            btn.style.display = 'none';
            document.querySelector('.modal-footer .btn').textContent = 'Close';
            toast('Session started: ' + r.name, true);
            refreshSessions();
        } catch (e) {
            toast('Failed: ' + e.message, false);
            btn.disabled = false; btn.textContent = 'Start Session';
        }
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function openModal() {
        document.getElementById('modal-body').innerHTML = `
            <div class="field">
                <label>Directory Path</label>
                <input id="path-in" type="text" placeholder="C:\\Users\\yourname\\projects\\myapp"
                       autocomplete="off" spellcheck="false">
                <div class="hint">Absolute path to the project directory to mount in the container.</div>
            </div>`;
        const btn = document.getElementById('start-btn');
        btn.style.display = ''; btn.disabled = false; btn.textContent = 'Start Session';
        document.querySelector('.modal-footer .btn').textContent = 'Cancel';
        document.getElementById('overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('path-in')?.focus(), 40);
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; }

    function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && document.getElementById('overlay').style.display === 'flex')
            if (document.getElementById('path-in')) createSession();
    });

    // ── Clipboard ─────────────────────────────────────────────────────────────
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.innerHTML;
            btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
                <polyline points="20 6 9 17 4 12"/></svg>`;
            setTimeout(() => btn.innerHTML = orig, 1600);
        }).catch(() => toast('Copy failed.', false));
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function toast(msg, ok) {
        const el = document.createElement('div');
        el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
        el.innerHTML = `<span style="color:${ok?'var(--accent)':'var(--danger)'};font-weight:700">${ok?'✓':'✗'}</span>${esc(msg)}`;
        document.getElementById('toast-wrap').appendChild(el);
        setTimeout(() => el.remove(), 4200);
    }

    // ── Escape ────────────────────────────────────────────────────────────────
    function esc(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    refreshStatus();
    refreshSessions();
    setInterval(refreshStatus,   30_000);
    setInterval(refreshSessions,  5_000);
</script>
</body>
</html>
